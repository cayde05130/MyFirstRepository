<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>간단 사천성 (Mobile)</title>
  <style>
    :root {
      --bg: #f6efe3;
      --panel: #fffaf2;
      --ink: #222;
      --accent: #c7836e;
      --tile-border: #c9c3b8;
      --tile-selected: #ffe45e;
      --tile-selected-glow: rgba(255, 238, 130, 0.85);
      --tile-match: #8bf7ff;
      --tile-match-glow: rgba(139, 247, 255, 0.9);
      --tile-hint: #7bc47f;
      --path-main: rgba(255, 255, 255, 0.96);
      --path-glow: rgba(150, 240, 255, 0.45);
      --path-glow-strong: rgba(130, 230, 255, 0.8);
      --path-glow-soft: rgba(130, 230, 255, 0.45);
      --board-bg-image: none;
      --media-w: 620px;
      --game-min-w: 760px;
      --tile-selected-outline: #ffe45e;
      --tile-selected-shadow: rgba(255, 238, 130, 0.52);
      --tile-selected-inner: rgba(255, 255, 255, 0.62);
      --range-track: linear-gradient(90deg, #efd4bc, #e8cbb0);
      --range-track-border: #d8c1a8;
      --range-thumb: linear-gradient(145deg, #f7b79d, #d6a98f);
      --range-thumb-border: #b78974;
      --btn-muted-bg: #9a7b5d;
      --btn-muted-hover: #8c6d50;
      --board-surface: rgba(246, 229, 202, 0.28);
      --theme-dur: 1900ms;
      --theme-ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { box-sizing: border-box; }

    html, body { overflow-x: hidden; }

    body {
      margin: 0;
      font-family: "Noto Sans KR", "Segoe UI Emoji", "Apple Color Emoji", "Segoe UI", sans-serif;
      background: radial-gradient(circle at 10% 10%, #fff7e6 0%, var(--bg) 55%, #ebe7de 100%);
      color: var(--ink);
      min-height: 100vh;
      padding: 24px;
      touch-action: manipulation;
      font-size: 16px;
      transition:
        background var(--theme-dur) var(--theme-ease),
        color var(--theme-dur) var(--theme-ease);
    }

    body.theme-dark {
      --bg: #101826;
      --panel: #1a2536;
      --ink: #e5e7eb;
      --accent: #6da2c3;
      --tile-border: #475569;
      --range-track: linear-gradient(90deg, #4f607c, #627896);
      --range-track-border: #4b5f78;
      --range-thumb: linear-gradient(145deg, #9bb6d6, #789dc4);
      --range-thumb-border: #5d7993;
      --btn-muted-bg: #4b6280;
      --btn-muted-hover: #3f5672;
      --board-surface: rgba(30, 41, 59, 0.42);
      background: radial-gradient(circle at 10% 10%, #253248 0%, #111827 62%, #0b1220 100%);
      color: var(--ink);
    }

    body.tone-cool {
      --range-track: linear-gradient(90deg, #d5e3f4, #c1d4ea);
      --range-track-border: #b6c8dd;
      --range-thumb: linear-gradient(145deg, #87a7ca, #6d8fb5);
      --range-thumb-border: #5f7fa5;
      --btn-muted-bg: #5f7fa5;
      --btn-muted-hover: #547195;
      --board-surface: rgba(211, 225, 242, 0.3);
    }

    body.theme-dark.tone-cool {
      --range-track: linear-gradient(90deg, #3d5572, #4f6a8b);
      --range-track-border: #446082;
      --range-thumb: linear-gradient(145deg, #88a6c8, #6f90b6);
      --range-thumb-border: #5d7d9e;
      --btn-muted-bg: #4c6990;
      --btn-muted-hover: #425d80;
      --board-surface: rgba(38, 57, 79, 0.44);
    }

    .app {
      max-width: 1720px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid #ddd6c8;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      transition:
        background var(--theme-dur) var(--theme-ease),
        border-color var(--theme-dur) var(--theme-ease),
        box-shadow var(--theme-dur) var(--theme-ease);
    }

    .toolbar {
      padding: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #ece7dc;
      background: #fffdf8;
      transition: background var(--theme-dur) var(--theme-ease), border-color var(--theme-dur) var(--theme-ease), color var(--theme-dur) var(--theme-ease);
    }

    .settings-head {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 6px;
      border-bottom: 1px dashed #e8dfcf;
      margin-bottom: 4px;
    }

    .settings-head strong {
      font-size: 14px;
      color: #334155;
      letter-spacing: 0.01em;
    }

    .settings-head-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .theme-toggle {
      min-height: 40px;
    }

    .toolbar label {
      font-size: 13px;
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 12px;
      background: linear-gradient(160deg, #fff8ef, #f9f0e3);
      border: 1px solid #e4d3bb;
      color: #5e4527;
      min-width: 122px;
    }

    .num-stepper {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border-radius: 12px;
      border: 1px solid #dfccb2;
      background: #fff6ea;
    }

    .step-btn {
      min-height: 42px;
      min-width: 42px;
      padding: 0;
      border-radius: 10px;
      background: #8a6b4d;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .num-stepper input[type="number"] {
      width: 64px;
      min-height: 42px;
      text-align: center;
      font-weight: 700;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ddc8ae;
      background: #fffdf9;
      color: #1f2937;
      padding: 4px 6px;
    }

    .mode-pill {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid #e4d3bb;
      background: linear-gradient(160deg, #fff8ef, #f9f0e3);
      font-size: 13px;
      font-weight: 700;
      color: #5e4527;
      min-width: 122px;
      transition: background var(--theme-dur) var(--theme-ease), border-color var(--theme-dur) var(--theme-ease), color var(--theme-dur) var(--theme-ease);
    }

    .mode-toggle {
      border-radius: 999px;
      overflow: hidden;
      background: #e8d8c2;
      border-color: #d8c3a8;
    }

    .mode-toggle .layout-btn {
      border-radius: 999px;
      padding: 6px 14px;
      min-height: 34px;
      font-size: 12px;
      color: #5a4423;
    }

    .mode-toggle .layout-btn.active {
      color: #31230f;
      box-shadow: 0 2px 10px rgba(49, 35, 15, 0.18);
    }

    .theme-row {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 2px;
    }

    .theme-row label {
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #f7f4ea;
      border: 1px solid #e6dfcf;
      border-radius: 8px;
      padding: 4px 8px;
    }

    .theme-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #7aa6c4;
    }

    .theme-row select {
      border: 1px solid #cfc8ba;
      border-radius: 8px;
      padding: 4px 6px;
      font-size: 13px;
      background: #fff;
    }

    .theme-row input[type="color"] {
      width: 28px;
      height: 28px;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }

    .audio-row {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 10px;
      margin-top: 2px;
      padding-top: 2px;
      border-top: 1px dashed #e8e1d3;
    }

    .media-column .audio-row {
      margin-top: 0;
      padding: 10px 12px 0;
      border-top: 0;
    }

    .toolbar > #mediaControls {
      display: none;
    }

    .audio-card {
      background: linear-gradient(160deg, #fff7ec, #f5ecde);
      border: 1px solid #e4d3bc;
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: background var(--theme-dur) var(--theme-ease), border-color var(--theme-dur) var(--theme-ease), color var(--theme-dur) var(--theme-ease);
    }

    .audio-card h4 {
      margin: 0;
      font-size: 13px;
      color: #334155;
      letter-spacing: 0.01em;
    }

    .audio-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .audio-row label {
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff9f0;
      border: 1px solid #e0cdb4;
      border-radius: 8px;
      padding: 4px 8px;
      color: #334155;
      transition: background var(--theme-dur) var(--theme-ease), border-color var(--theme-dur) var(--theme-ease), color var(--theme-dur) var(--theme-ease);
    }

    .audio-row select,
    .audio-row input[type="text"] {
      border: 1px solid #dcc8af;
      border-radius: 8px;
      padding: 4px 6px;
      font-size: 13px;
      background: #fff;
      color: #1f2937;
    }

    .audio-row input[type="text"] {
      min-width: 220px;
    }

    .audio-row input[type="range"] {
      width: 160px;
      appearance: none;
      -webkit-appearance: none;
      height: 14px;
      border-radius: 999px;
      background: var(--range-track);
      border: 1px solid var(--range-track-border);
      padding: 0;
      transition: background var(--theme-dur) var(--theme-ease), border-color var(--theme-dur) var(--theme-ease);
    }

    .audio-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 14px;
      border-radius: 5px;
      background: var(--range-thumb);
      border: 1px solid var(--range-thumb-border);
      box-shadow: 0 1px 2px rgba(40, 51, 66, 0.25);
      cursor: pointer;
      transition: background var(--theme-dur) var(--theme-ease), border-color var(--theme-dur) var(--theme-ease), box-shadow var(--theme-dur) var(--theme-ease);
    }

    .audio-row input[type="range"]::-moz-range-track {
      height: 14px;
      border-radius: 999px;
      background: var(--range-track);
      border: 1px solid var(--range-track-border);
    }

    .audio-row input[type="range"]::-moz-range-thumb {
      width: 22px;
      height: 14px;
      border-radius: 5px;
      background: var(--range-thumb);
      border: 1px solid var(--range-thumb-border);
      box-shadow: 0 1px 2px rgba(40, 51, 66, 0.25);
      cursor: pointer;
      transition: background var(--theme-dur) var(--theme-ease), border-color var(--theme-dur) var(--theme-ease), box-shadow var(--theme-dur) var(--theme-ease);
    }

    .audio-hint {
      font-size: 12px;
      color: #475569;
      margin: 0;
    }

    .layout-toggle {
      position: relative;
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: center;
      background: #ecd9c1;
      border: 1px solid #dcc5a9;
      border-radius: 10px;
      padding: 3px;
      gap: 0;
      transition: background var(--theme-dur) var(--theme-ease), border-color var(--theme-dur) var(--theme-ease);
    }

    .layout-toggle::before {
      content: "";
      position: absolute;
      top: 3px;
      bottom: 3px;
      left: 3px;
      width: calc((100% - 6px) / 2);
      border-radius: 8px;
      background: #fffdf9;
      box-shadow: 0 2px 10px rgba(60, 33, 8, 0.14);
      transform: translateX(calc(var(--seg-index, 0) * 100%));
      transition: transform 360ms cubic-bezier(0.22, 1, 0.36, 1), background var(--theme-dur) var(--theme-ease), box-shadow var(--theme-dur) var(--theme-ease);
      z-index: 0;
    }

    .layout-btn {
      border: 0;
      border-radius: 8px;
      min-height: 32px;
      padding: 6px 12px;
      background: transparent;
      color: #6a4f2f;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      z-index: 1;
      transition:
        color var(--theme-dur) var(--theme-ease),
        transform 220ms var(--theme-ease);
    }

    .layout-btn.active {
      color: #34210e;
      transform: translateY(-1px);
    }

    body.theme-dark .app {
      border-color: #334155;
      box-shadow: 0 18px 36px rgba(2, 6, 23, 0.45);
    }

    body.theme-dark .toolbar,
    body.theme-dark .stats {
      background: #0b1220;
      border-color: #334155;
      color: #cbd5e1;
    }

    body.theme-dark .settings-head {
      border-bottom-color: rgba(148, 163, 184, 0.28);
    }

    body.theme-dark .audio-row {
      border-top-color: rgba(148, 163, 184, 0.22);
    }

    body.theme-dark .settings-head strong,
    body.theme-dark .audio-card h4 {
      color: #e2e8f0;
    }

    body.theme-dark .panel-section {
      background: linear-gradient(160deg, rgba(15, 23, 42, 0.96), rgba(15, 23, 42, 0.9));
      border-color: rgba(71, 85, 105, 0.78);
    }

    body.theme-dark .panel-head,
    body.theme-dark .media-head {
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.92));
      border-bottom-color: rgba(71, 85, 105, 0.74);
      color: #e2e8f0;
    }

    body.theme-dark .audio-card,
    body.theme-dark .settings-dialog {
      background: rgba(15, 23, 42, 0.94);
      border-color: rgba(71, 85, 105, 0.72);
      color: #dbeafe;
    }

    body.theme-dark .theme-row label {
      background: #1f2a3d;
      border-color: #475569;
      color: #dbeafe;
    }

    body.theme-dark .theme-row select {
      background: #111827;
      border-color: #475569;
      color: #e5e7eb;
    }

    body.theme-dark .audio-row label {
      background: #1f2a3d;
      border-color: #475569;
      color: #dbeafe;
    }

    body.theme-dark .audio-row input[type="range"] {
      background: var(--range-track);
      border-color: var(--range-track-border);
    }

    body.theme-dark .audio-row input[type="range"]::-webkit-slider-thumb,
    body.theme-dark .audio-row input[type="range"]::-moz-range-thumb {
      background: var(--range-thumb);
      border-color: var(--range-thumb-border);
    }

    body.theme-dark .num-stepper {
      background: #1f2a3d;
      border-color: #475569;
    }

    body.theme-dark .step-btn {
      background: #4b6280;
    }

    body.theme-dark .num-stepper input[type="number"] {
      background: #111827;
      border-color: #475569;
      color: #e5e7eb;
    }

    body.theme-dark .toolbar label {
      background: #1f2a3d;
      border-color: #475569;
      color: #dbeafe;
    }

    body.theme-dark .mode-pill {
      border-color: #475569;
      background: #1f2a3d;
      color: #dbeafe;
    }

    body.theme-dark .mode-toggle {
      background: #334155;
      border-color: #475569;
    }

    body.theme-dark .mode-toggle .layout-btn {
      color: #dbeafe;
    }

    body.theme-dark .mode-toggle .layout-btn.active {
      background: #0f172a;
      color: #f8fafc;
      box-shadow: 0 2px 10px rgba(2, 6, 23, 0.4);
    }

    body.theme-dark .audio-hint,
    body.theme-dark .message,
    body.theme-dark .settings-note {
      color: #cbd5e1;
    }

    body.theme-dark input,
    body.theme-dark select {
      background: #111827;
      color: #e5e7eb;
      border-color: #475569;
    }

    body.theme-dark .layout-toggle {
      background: #1e293b;
      border-color: #334155;
    }

    body.theme-dark .layout-toggle::before {
      background: #0f172a;
      box-shadow: 0 2px 12px rgba(2, 6, 23, 0.5);
    }

    body.theme-dark .layout-btn {
      color: #cbd5e1;
    }

    body.theme-dark .layout-btn.active {
      color: #f8fafc;
      box-shadow: none;
    }

    body.theme-dark .time-chip {
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: linear-gradient(145deg, rgba(30, 41, 59, 0.76), rgba(51, 65, 85, 0.66));
      box-shadow: 0 8px 20px rgba(2, 6, 23, 0.26), inset 0 1px 0 rgba(148, 163, 184, 0.16);
      color: #dbeafe;
    }

    body.theme-dark .time-chip .label {
      opacity: 0.8;
      color: #cbd5e1;
    }

    body.theme-dark .mode-info {
      color: #dbeafe;
      background: rgba(30, 41, 59, 0.56);
      border: 1px solid rgba(148, 163, 184, 0.28);
    }

    .yt-wrap {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      margin: 12px auto;
      width: calc(100% - 24px);
      flex: 1;
    }

    .local-video {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #020617;
      display: none;
    }

    .yt-wrap.local-active .local-video {
      display: block;
    }

    .yt-wrap.local-active .yt-frame,
    .yt-wrap.local-active .yt-placeholder {
      display: none;
    }

    .yt-placeholder {
      min-height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #cbd5e1;
      font-size: 14px;
      text-align: center;
      padding: 18px;
      line-height: 1.5;
    }

    .yt-frame {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      display: none;
    }

    .yt-wrap.active .yt-frame {
      display: block;
    }

    .yt-wrap.active .yt-placeholder {
      display: none;
    }

    .play-layout {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-areas:
        "game"
        "media";
      gap: 12px;
      padding: 8px 16px 16px;
    }

    .game-column {
      grid-area: game;
      min-width: 0;
      display: flex;
    }

    .panel-section {
      background: linear-gradient(160deg, rgba(255, 252, 246, 0.92), rgba(248, 239, 224, 0.84));
      border: 1px solid rgba(220, 197, 166, 0.72);
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      overflow: hidden;
      transition: background var(--theme-dur) var(--theme-ease), border-color var(--theme-dur) var(--theme-ease), box-shadow var(--theme-dur) var(--theme-ease);
    }

    .panel-head {
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
      color: #5a4529;
      border-bottom: 1px solid rgba(219, 197, 169, 0.48);
      background: transparent;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      transition: background var(--theme-dur) var(--theme-ease), border-color var(--theme-dur) var(--theme-ease), color var(--theme-dur) var(--theme-ease);
    }

    .panel-head .time-chip {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
    }

    

    
    .panel-body {
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

.game-actions {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 0 12px 10px;
      box-sizing: border-box;
    }

    .media-column {
      grid-area: media;
      min-width: 260px;
      display: flex;
    }

    .game-column .panel-section,
    .media-column .panel-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .media-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
      font-size: 13px;
      color: #5a4529;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(219, 197, 169, 0.48);
      background: transparent;
      min-height: 52px;
      transition: background var(--theme-dur) var(--theme-ease), border-color var(--theme-dur) var(--theme-ease), color var(--theme-dur) var(--theme-ease);
    }

    .media-toggle-btn {
      min-height: 34px;
      padding: 6px 10px;
      font-size: 13px;
      border-radius: 8px;
    }

    #mediaControls.collapsed {
      display: none !important;
    }

    .play-layout[data-layout="stack"] {
      grid-template-columns: 1fr;
      grid-template-areas:
        "game"
        "media";
    }

    .play-layout[data-layout="stack"] .media-column {
      min-width: 0;
      width: 100%;
    }

    .play-layout[data-layout="stack"] .yt-wrap {
      width: 100%;
      min-height: 220px;
      flex: 0 0 auto;
    }

    @media (min-width: 1024px) {
      .play-layout[data-layout="side"] {

    input[type="number"] {

    input[type="number"]::-webkit-outer-spin-button,

    input[type="number"] {

      -moz-appearance: textfield;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 8px 12px;
      background: #333;
      color: #fff;
      font-size: 17px;

    .stats {

      border-bottom: 1px solid #ece7dc;

      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      transition: background var(--theme-dur) var(--theme-ease), border-color var(--theme-dur) var(--theme-ease), color var(--theme-dur) var(--theme-ease);

    .time-chip {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.6);

      min-width: 172px;
      justify-content: center;
      transition: background var(--theme-dur) var(--theme-ease), border-color var(--theme-dur) var(--theme-ease), color var(--theme-dur) var(--theme-ease), box-shadow var(--theme-dur) var(--theme-ease);

    .time-chip .label {
      font-size: 11px;
      font-weight: 700;
      opacity: 0.75;
      text-transform: uppercase;
    }

    .time-chip .value {
      font-size: 18px;
      line-height: 1;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .mode-info {
      font-size: 13px;
      color: #5a4429;
      background: rgba(255, 250, 242, 0.68);
      border: 1px solid rgba(225, 203, 173, 0.66);
      border-radius: 999px;
      padding: 5px 10px;
      transition: background var(--theme-dur) var(--theme-ease), border-color var(--theme-dur) var(--theme-ease), color var(--theme-dur) var(--theme-ease);
    }

    .game-surface {
      background-image:
        linear-gradient(rgba(255, 248, 238, 0.34), rgba(255, 248, 238, 0.34)),
        var(--board-bg-image),
        linear-gradient(140deg, #f8efe2, #efe1cd);
      background-size: cover, cover, cover;
      background-position: center, center, center;
      background-repeat: no-repeat, no-repeat, no-repeat;
      transition: background-image var(--theme-dur) var(--theme-ease);
    }

    body.theme-dark .game-surface {
      background-image:
        linear-gradient(rgba(26, 37, 54, 0.68), rgba(26, 37, 54, 0.68)),
        var(--board-bg-image),
        linear-gradient(140deg, #27364c, #1a2536);
    }

    .board-wrap {
      padding: 12px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x pan-y;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 360px;
      width: 100%;
    }

    .board-stack {
      position: relative;
      display: block;
      width: 100%;
      margin: 0 auto;
      padding: 0;
      box-sizing: border-box;
    }

    .path-layer {
      position: absolute;
      pointer-events: none;
      z-index: 3;
      inset: 0;
      overflow: visible;
    }

    .board {
      display: grid;
      gap: 0;
      justify-content: center;
      align-content: start;
      min-height: 260px;
      min-width: 0;
      position: relative;
      z-index: 2;
      padding: 8px;
      border-radius: 12px;
      background: var(--board-surface);
      backdrop-filter: blur(0.5px);
      touch-action: manipulation;
      transition: background var(--theme-dur) var(--theme-ease), border-color var(--theme-dur) var(--theme-ease);
    }

    body.theme-dark .board {
      background: var(--board-surface);
    }

    .tile {
      --hover-lift: 0px;
      --hover-scale: 1;
      --sel-scale: 1;
      width: 56px;
      height: 66px;
      border: 1px solid var(--tile-border);
      border-radius: 12px;
      color: #1f2937;
      font-size: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transform: translate3d(0, calc(var(--hover-lift) * -1), 0) scale(calc(var(--sel-scale) * var(--hover-scale)));
      transition: transform 280ms cubic-bezier(0.22, 1, 0.36, 1), box-shadow 280ms cubic-bezier(0.22, 1, 0.36, 1), background 180ms ease;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.7);
      position: relative;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      will-change: transform;
      background-image:
        linear-gradient(145deg, rgba(255,255,255,0.9), rgba(255,255,255,0.4)),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 6px, rgba(0,0,0,0.03) 6px, rgba(0,0,0,0.03) 12px),
        linear-gradient(120deg, hsl(var(--h) 60% 86%), hsl(var(--h) 55% 74%));
    }

    body.theme-dark .tile {
      color: #eef2ff;
      text-shadow: 0 1px 0 rgba(2, 6, 23, 0.7);
      background-color: hsl(var(--h) 24% 34%);
      background-image:
        linear-gradient(155deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.03)),
        linear-gradient(125deg, hsl(var(--h) 24% 42%), hsl(var(--h) 24% 32%));
    }

    .tile:hover {
      --hover-lift: 3px;
      --hover-scale: 1.03;
    }

    .tile.selected {
      --sel-scale: 1.06;
      z-index: 4;
      box-shadow: 0 0 0 1px var(--tile-selected-inner) inset, 0 0 12px var(--tile-selected-shadow);
    }

    body.theme-dark .tile.selected {
      box-shadow: 0 0 0 1px rgba(203, 213, 225, 0.28) inset, 0 0 18px var(--tile-selected-shadow);
    }

    .tile.hint {
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.68) inset,
        0 0 0 2px rgba(103, 224, 126, 0.72),
        0 0 18px rgba(103, 224, 126, 0.52);
      animation: hintPulse 1.25s ease-in-out infinite;
    }

    body.theme-dark .tile.hint {
      box-shadow:
        0 0 0 1px rgba(203, 213, 225, 0.34) inset,
        0 0 0 2px rgba(134, 255, 166, 0.8),
        0 0 20px rgba(134, 255, 166, 0.56);
    }

    .tile.removed {
      visibility: hidden;
      pointer-events: none;
    }

    .tile.removing {
      pointer-events: none;
      animation: tileFadeOut 0.28s ease forwards;
    }

    .tile.fail {
      animation: shake 0.28s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    .tile.success {
      animation: pop 0.22s ease;
      outline: 3px solid var(--tile-match);
      outline-offset: -3px;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.72) inset, 0 0 16px var(--tile-match-glow);
    }

    .tile.success.removing {
      animation: pop 0.14s ease, tileFadeOut 0.28s ease forwards;
    }

    .path-main {
      --path-base-width: 3.5;
      --path-peak-width: 4.4;
      stroke: var(--path-main);
      stroke-width: var(--path-base-width);
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 3px var(--path-glow-strong)) drop-shadow(0 0 9px var(--path-glow-soft));
      animation:
        drawPath 0.68s cubic-bezier(0.16, 0.84, 0.24, 1) forwards,
        pathBloom 0.68s cubic-bezier(0.16, 0.84, 0.24, 1) forwards,
        pathFadeOut 0.48s ease 0.46s forwards;
    }

    .path-glow {
      --path-base-width: 7;
      --path-peak-width: 8.8;
      stroke: var(--path-glow);
      stroke-width: var(--path-base-width);
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: blur(1.5px);
      animation:
        drawPath 0.74s cubic-bezier(0.16, 0.84, 0.24, 1) forwards,
        pathBloom 0.74s cubic-bezier(0.16, 0.84, 0.24, 1) forwards,
        pathFadeOut 0.52s ease 0.5s forwards;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
      100% { transform: translateX(0); }
    }

    @keyframes pop {
      0% { transform: scale(1); }
      45% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    @keyframes drawPath {
      0% { stroke-dashoffset: var(--path-len, 220); opacity: 0.06; }
      30% { opacity: 0.78; }
      68% { opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: 1; }
    }

    @keyframes pathBloom {
      0% {
        stroke-width: calc(var(--path-base-width) * 0.86);
        opacity: 0.72;
      }
      45% {
        stroke-width: var(--path-peak-width);
        opacity: 1;
      }
      100% {
        stroke-width: var(--path-base-width);
        opacity: 1;
      }
    }

    @keyframes pathFadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes tileFadeOut {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(0.92); }
    }

    @keyframes hintPulse {
      0%, 100% {
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.66) inset,
          0 0 0 2px rgba(103, 224, 126, 0.66),
          0 0 12px rgba(103, 224, 126, 0.42);
      }
      50% {
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.78) inset,
          0 0 0 2px rgba(103, 224, 126, 0.9),
          0 0 24px rgba(103, 224, 126, 0.7);
      }
    }

    .tile.spawning {
      opacity: 0;
      transform: translate3d(0, -18px, 0) scale(0.96);
      animation: tileSpawn 420ms cubic-bezier(0.18, 0.8, 0.2, 1) forwards;
      animation-delay: var(--spawn-delay, 0ms);
    }

    @keyframes tileSpawn {
      0% {
        opacity: 0;
        transform: translate3d(0, -18px, 0) scale(0.96);
      }
      100% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    .message {
      padding: 0 12px 12px;
      font-size: 14px;
      color: #334155;
      min-height: 22px;
      background: transparent;
      width: 100%;
      text-align: center;
    }

    .clear-popup {
      position: absolute;
      inset: 0;
      z-index: 8;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      padding: 12px;
      background: transparent;
    }

    .clear-popup.show {
      display: flex;
      animation: clearFadeIn 240ms ease forwards;
    }

    .start-overlay {
      position: absolute;
      inset: 0;
      z-index: 7;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.44), rgba(255, 255, 255, 0.3));
      pointer-events: none;
      transition: background var(--theme-dur) var(--theme-ease);
    }

    body.theme-dark .start-overlay {
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.46), rgba(15, 23, 42, 0.34));
    }

    .start-overlay.show {
      display: flex;

    .start-overlay .start-btn {

      min-height: 54px;
      font-size: 18px;
      font-weight: 800;
      border-radius: 14px;
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.24);
    }

    .clear-card {
      width: min(340px, 92%);
      border-radius: 18px;
      border: 1px solid rgba(224, 196, 160, 0.9);
      background: linear-gradient(180deg, rgba(255, 251, 243, 0.97), rgba(246, 229, 206, 0.94));
      box-shadow: 0 16px 34px rgba(64, 42, 16, 0.2);
      padding: 16px 14px 14px;
      text-align: center;
      pointer-events: auto;
    }

    body.theme-dark .clear-card {
      border-color: rgba(71, 85, 105, 0.82);

    .clear-title {

    .clear-time-label {

    .clear-time-value {
      font-size: 32px;
      font-weight: 800;

    }

    body.theme-dark .clear-time-value {
      color: #f8fafc;
      text-shadow: 0 1px 0 rgba(2, 6, 23, 0.62);
    }

    .clear-newgame-btn {
      min-width: 130px;
    }

    @keyframes clearFadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    .settings-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(2, 6, 23, 0.45);

    .settings-dialog {

      border-radius: 14px;
      border: 1px solid #d8e0ea;
      background: #f8fbff;
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.28);

    .settings-dialog-head {
      display: flex;
      align-items: center;

    }

      color: #f1f5f9;
    }

    .settings-note {
      margin: 8px 0 0;
      font-size: 12px;
      color: #475569;
    }

    body.low-spec .tile,
    body.low-spec .layout-btn,
    body.low-spec .panel-section {
      transition-duration: 120ms !important;
    }

    body.low-spec .tile.fail,
    body.low-spec .tile.success,
    body.low-spec .tile.removing {
      animation: none !important;
    }

    body.low-spec .tile.hint {
      animation: none !important;
    }

    body.low-spec .path-glow {
      display: none !important;
    }

    body.low-spec .tile.spawning {
      opacity: 1 !important;
      animation: none !important;
      transform: none !important;
    }

    body.low-spec .board,
    body.low-spec .time-chip,
    body.low-spec .panel-section {
      backdrop-filter: none !important;
      box-shadow: none !important;

    @media (max-width: 640px) {

      }

    @media (prefers-reduced-motion: reduce) {
      :root {

      }
    }

    body.mobile-no-media #mediaControls,
    body.mobile-no-media .media-column {
      display: none !important;
    }

    body.mobile-no-media #playLayout {
      grid-template-columns: 1fr !important;
      grid-template-areas: "game" !important;
    }
  </style>
</head>

    const BASE_BGM_TRACKS = [

      { name: "Online · Spring Walk", url: "https://assets.mixkit.co/music/preview/mixkit-valley-sunset-127.mp3" },

    ];

      customUrls: [],

      unlocked: false,
      pendingAutoplay: false,

      synthGain: null,
      synthTimer: null,
      synthName: "",
      synthStep: 0

    const THEME_PRESETS = {
      sunset: { selected: "#ffe45e", match: "#8bf7ff", path: "#ffffff", pathGlow: "#82e6ff" },
      mint: { selected: "#c7ff6f", match: "#72ffd8", path: "#f6fffb", pathGlow: "#6df7d0" },
      ice: { selected: "#b5e9ff", match: "#8fd8ff", path: "#ffffff", pathGlow: "#8fd8ff" }
    };

    function hexToRgba(hex, alpha) {
      const v = hex.replace("#", "");
      const n = v.length === 3 ? v.split("").map((ch) => ch + ch).join("") : v;
      const r = parseInt(n.slice(0, 2), 16);
      const g = parseInt(n.slice(2, 4), 16);
      const b = parseInt(n.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function applyThemeColors(colors) {
      const root = document.documentElement;
      const glow = colors.pathGlow || colors.path;
      root.style.setProperty("--tile-selected", colors.selected);
      root.style.setProperty("--tile-selected-glow", hexToRgba(colors.selected, 0.9));
      root.style.setProperty("--tile-match", colors.match);
      root.style.setProperty("--tile-match-glow", hexToRgba(colors.match, 0.92));
      root.style.setProperty("--path-main", colors.path);
      root.style.setProperty("--path-glow", hexToRgba(glow, 0.45));
      root.style.setProperty("--path-glow-strong", hexToRgba(glow, 0.82));
      root.style.setProperty("--path-glow-soft", hexToRgba(glow, 0.48));
      applySelectionStyle(state.selectionStyle);

      pickSelectedEl.value = colors.selected;
      pickMatchEl.value = colors.match;
      pickPathEl.value = colors.path;
      pickPathGlowEl.value = glow;
    }

    function applySelectionStyle(style) {
      const next = style === "neon" ? "neon" : "soft";
      state.selectionStyle = next;
      const root = document.documentElement;
      const isDark = document.body.classList.contains("theme-dark");
      const base = getComputedStyle(root).getPropertyValue("--tile-selected").trim() || "#ffe45e";
      if (next === "neon") {
        root.style.setProperty("--tile-selected-outline", base);
        root.style.setProperty("--tile-selected-shadow", hexToRgba(base, isDark ? 0.96 : 0.88));
        root.style.setProperty("--tile-selected-inner", "rgba(255, 255, 255, 0.82)");
      } else {
        root.style.setProperty("--tile-selected-outline", "transparent");
        root.style.setProperty("--tile-selected-shadow", isDark ? hexToRgba(base, 0.74) : "rgba(31, 41, 55, 0.32)");
        root.style.setProperty("--tile-selected-inner", "rgba(255, 255, 255, 0)");
      }
      if (selectionStyleEl) selectionStyleEl.value = next;
      try {
        localStorage.setItem("sichuan-selection-style", next);
      } catch (err) {
        // ignore storage failures
      }
    }

    function applyPerformanceMode(enabled) {
      const on = Boolean(enabled);
      state.lowSpec = on;
      document.body.classList.toggle("low-spec", on);
      if (lowSpecModeEl) lowSpecModeEl.checked = on;
      if (on) {
        if (state.hoverRaf) {
          cancelAnimationFrame(state.hoverRaf);
          state.hoverRaf = 0;
        }
        state.hoverPoint = null;
        for (const tile of state.hoverActiveTiles) {
          tile.style.setProperty("--hover-lift", "0px");
          tile.style.setProperty("--hover-scale", "1");
          tile.dataset.hw = "0";
        }
        state.hoverActiveTiles = [];
      }
      try {
        localStorage.setItem("sichuan-low-spec", on ? "1" : "0");
      } catch (err) {
        // ignore storage failures
      }
    }

    function setBoardBackgroundImage(url) {
      document.documentElement.style.setProperty("--board-bg-image", url ? `url("${url}")` : "none");
    }

    function rebuildBgmOptions() {
      bgmPresetEl.innerHTML = "";
      bgmState.tracks.forEach((track, idx) => {
        const option = document.createElement("option");
        option.value = String(idx);
        option.textContent = track.name;
        bgmPresetEl.appendChild(option);
      });
      bgmPresetEl.value = String(Math.max(0, Math.min(bgmState.currentIndex, bgmState.tracks.length - 1)));
    }

    function stopYoutubePlayback() {
      ytFrameEl.src = "";
      ytWrapEl.classList.remove("active");
      bgmState.youtubeActive = false;
    }

    function stopLocalVideoPlayback() {
      localVideoEl.pause();
      localVideoEl.removeAttribute("src");
      localVideoEl.load();
      ytWrapEl.classList.remove("local-active");
      if (state.localVideoUrl) {
        URL.revokeObjectURL(state.localVideoUrl);
        state.localVideoUrl = null;
      }
      uploadVideoEl.value = "";
    }

    function ensureSynthContext() {
      if (bgmState.synthCtx) return;
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      bgmState.synthCtx = new Ctx();
      bgmState.synthGain = bgmState.synthCtx.createGain();
      bgmState.synthGain.gain.value = Number(bgmVolumeEl.value) / 100 * (bgmPlayer.muted ? 0 : 1);
      bgmState.synthGain.connect(bgmState.synthCtx.destination);
    }

    function stopSynth() {
      if (bgmState.synthTimer) {
        clearInterval(bgmState.synthTimer);
        bgmState.synthTimer = null;
      }
    }

    function synthPattern(name) {
      if (name === "mint") return [523.25, 659.25, 783.99, 659.25, 587.33, 698.46, 783.99, 698.46];
      if (name === "bubble") return [659.25, 783.99, 880.0, 783.99, 698.46, 783.99, 659.25, 587.33];
      return [587.33, 739.99, 880.0, 739.99, 659.25, 783.99, 987.77, 783.99];
    }

    function playSynth(name) {
      ensureSynthContext();
      if (!bgmState.synthCtx || !bgmState.synthGain) return;
      stopSynth();

      bgmState.synthName = name;
      bgmState.synthStep = 0;
      const pattern = synthPattern(name);
      const beatMs = 280;

      const tick = () => {
        if (!bgmState.synthCtx || !bgmState.synthGain) return;
        const freq = pattern[bgmState.synthStep % pattern.length];
        bgmState.synthStep += 1;

        const now = bgmState.synthCtx.currentTime;
        const osc = bgmState.synthCtx.createOscillator();
        const env = bgmState.synthCtx.createGain();
        osc.type = "triangle";
        osc.frequency.value = freq;
        env.gain.setValueAtTime(0.0001, now);
        env.gain.exponentialRampToValueAtTime(0.35, now + 0.03);
        env.gain.exponentialRampToValueAtTime(0.0001, now + 0.22);
        osc.connect(env);
        env.connect(bgmState.synthGain);
        osc.start(now);
        osc.stop(now + 0.24);
      };

      tick();
      bgmState.synthTimer = setInterval(tick, beatMs);
    }

    function tryUnlockAudio() {
      if (bgmState.unlocked) return Promise.resolve(true);
      if (!bgmPlayer.src) applyBgmTrack(bgmState.currentIndex, false);
      ensureSynthContext();

      return bgmPlayer.play().then(() => {
        bgmPlayer.pause();
        bgmPlayer.currentTime = 0;
        bgmState.unlocked = true;
        if (bgmState.pendingAutoplay) {
          bgmState.pendingAutoplay = false;
          const current = bgmState.tracks[bgmState.currentIndex];
          if (current && current.synth) {
            playSynth(current.synth);
            return true;
          }
          return bgmPlayer.play().then(() => true).catch(() => false);
        }
        return true;
      }).catch(() => {
        const current = bgmState.tracks[bgmState.currentIndex];
        if (current && current.synth) {
          bgmState.unlocked = true;
          if (bgmState.pendingAutoplay) {
            bgmState.pendingAutoplay = false;
            playSynth(current.synth);
          }
          return true;
        }
        return false;
      });
    }

    function applyBgmTrack(index, autoplay = false) {
      if (!bgmState.tracks[index]) return;
      bgmState.currentIndex = index;
      bgmPresetEl.value = String(index);
      if (bgmState.youtubeActive) stopYoutubePlayback();
      const track = bgmState.tracks[index];
      stopSynth();
      if (track.synth) {
        bgmPlayer.pause();
        bgmPlayer.removeAttribute("src");
        if (autoplay) playSynth(track.synth);
        return;
      }

      bgmPlayer.src = track.url;
      if (autoplay) {
        if (bgmState.synthCtx) stopSynth();
        bgmPlayer.play().catch(() => {
          setMessage("브라우저 정책으로 자동 재생이 차단되었습니다. 재생 버튼을 눌러주세요.");
        });
      }
    }

    function extractYoutubeId(input) {
      const raw = input.trim();
      const patterns = [
        /youtu\.be\/([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/,
        /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/
      ];
      for (const pattern of patterns) {
        const m = raw.match(pattern);
        if (m) return m[1];
      }
      return null;
    }

    function playYoutube() {
      const id = extractYoutubeId(youtubeUrlEl.value);
      if (!id) {
        setMessage("유효한 YouTube 링크를 입력해주세요.");
        return;
      }

      stopLocalVideoPlayback();
      bgmPlayer.pause();
      const origin = location.protocol.startsWith("http") ? `&origin=${encodeURIComponent(location.origin)}` : "";
      const src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&loop=1&playlist=${id}&rel=0&modestbranding=1&playsinline=1&enablejsapi=1${origin}`;
      ytFrameEl.src = src;
      ytWrapEl.classList.add("active");
      bgmState.youtubeActive = true;

      if (location.protocol === "file:") {
        setMessage("로컬 파일(file://)에서는 YouTube 임베드 오류가 날 수 있습니다. 가능하면 로컬 서버로 열어주세요.");
      } else {
        setMessage("YouTube 재생을 시작했습니다. 임베드가 막힌 영상이면 우측 링크로 여세요.");
      }
    }

    function playLocalVideo(file) {
      if (!file) return;
      stopYoutubePlayback();
      stopLocalVideoPlayback();

      const url = URL.createObjectURL(file);
      state.localVideoUrl = url;
      localVideoEl.src = url;
      ytWrapEl.classList.add("local-active");
      localVideoEl.play().catch(() => {
        setMessage("영상 자동 재생이 차단되었습니다. 영상 영역의 재생 버튼을 눌러주세요.");
      });
      setMessage(`오프라인 영상 재생: ${file.name}`);
    }

    function applyLayoutMode(mode) {
      const nextMode = mode === "stack" ? "stack" : "side";
      playLayoutEl.dataset.layout = nextMode;
      layoutSideBtnEl.classList.toggle("active", nextMode === "side");
      layoutStackBtnEl.classList.toggle("active", nextMode === "stack");
      setSegmentPosition(layoutToggleEl, nextMode === "stack" ? 1 : 0);
      applyMediaWidthFromSlider();
    }

    function applyMediaWidthFromSlider() {
      const requested = Number(ytSizeEl.value) || 620;
      let applied = requested;

      if (playLayoutEl.dataset.layout === "side") {
        const minGame = 700;
        const horizontalPadding = 120;
        const viewport = window.innerWidth || document.documentElement.clientWidth || 1440;
        const maxMedia = Math.max(420, viewport - minGame - horizontalPadding);
        applied = Math.min(requested, maxMedia);
      }

      document.documentElement.style.setProperty("--media-w", `${applied}px`);
      if (applied !== requested) ytSizeEl.value = String(Math.round(applied));
    }

    function setSegmentPosition(toggleEl, index) {
      if (!toggleEl) return;
      toggleEl.style.setProperty("--seg-index", String(index === 1 ? 1 : 0));
    }

    function applyUiTone(tone) {
      const nextTone = tone === "cool" ? "cool" : "warm";

      document.body.classList.toggle("tone-cool", nextTone === "cool");
      if (toneWarmBtnEl) toneWarmBtnEl.classList.toggle("active", nextTone === "warm");
      if (toneCoolBtnEl) toneCoolBtnEl.classList.toggle("active", nextTone === "cool");
      setSegmentPosition(uiToneToggleEl, nextTone === "cool" ? 1 : 0);
      try {
        localStorage.setItem("sichuan-ui-tone", nextTone);
      } catch (err) {
        // ignore storage failures
      }
    }

    function applyUiTheme(mode) {
      const isDark = mode === "dark";
      document.body.classList.toggle("theme-dark", isDark);
      lightModeBtnEl.classList.toggle("active", !isDark);
      darkModeBtnEl.classList.toggle("active", isDark);

        localStorage.setItem("sichuan-ui-theme", isDark ? "dark" : "light");
      } catch (err) {

    function setMediaControlsCollapsed(collapsed) {
      if (!mediaControlsEl || !toggleMediaControlsEl) return;

      toggleMediaControlsEl.textContent = collapsed ? "컨트롤 펼치기" : "컨트롤 접기";
      try {
        localStorage.setItem("sichuan-media-controls-collapsed", collapsed ? "1" : "0");
