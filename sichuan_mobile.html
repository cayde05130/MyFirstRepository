    function bindStepper(inputEl, downBtnId, upBtnId) {
      const down = document.getElementById(downBtnId);
      const up = document.getElementById(upBtnId);
      if (!inputEl || !down || !up) return;

      function clampNext(delta) {
        const current = Number(inputEl.value);
        const min = Number(inputEl.min || "0");
        const max = Number(inputEl.max || "999");
        const safeCurrent = Number.isFinite(current) ? current : min;
        const next = Math.min(max, Math.max(min, safeCurrent + delta));
        inputEl.value = String(next);
      }

      down.addEventListener("click", () => clampNext(-1));
      up.addEventListener("click", () => clampNext(1));
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60).toString().padStart(2, "0");
      const s = (sec % 60).toString().padStart(2, "0");
      return `${m}:${s}`;
    }

    function stopTimer() {
      if (state.timerId) {
        clearInterval(state.timerId);
        state.timerId = null;
      }
    }

    function startTimer() {
      stopTimer();
      state.timerId = setInterval(() => {
        state.elapsedSec += 1;
        timeDisplayEl.textContent = formatTime(state.elapsedSec);
      }, 1000);
    }

    function updateModeHud() {
      const cfg = MODE_CONFIG[state.mode];
      modeInfoEl.textContent = cfg.label;
      hintLeftEl.textContent = Number.isFinite(state.hintLeft) ? String(state.hintLeft) : "∞";
      shuffleLeftEl.textContent = Number.isFinite(state.shuffleLeft) ? String(state.shuffleLeft) : "∞";
      timeDisplayEl.textContent = formatTime(state.elapsedSec);
    }

    function setModeChoice(mode, previewOnly = false) {
      state.mode = mode === "challenge" ? "challenge" : "relaxed";
      modeRelaxedBtnEl.classList.toggle("active", state.mode === "relaxed");
      modeChallengeBtnEl.classList.toggle("active", state.mode === "challenge");
      setSegmentPosition(modeToggleEl, state.mode === "challenge" ? 1 : 0);
      if (previewOnly) {
        modeInfoEl.textContent = `${MODE_CONFIG[state.mode].label} (새 게임부터 적용)`;
        return;
      }
      updateModeHud();
    }

    function setStartOverlayVisible(show) {
      if (!startOverlayEl) return;
      startOverlayEl.classList.toggle("show", show);
      startOverlayEl.setAttribute("aria-hidden", show ? "false" : "true");
    }

    function resetToStartScreen() {
      stopTimer();
      state.started = false;
      state.selected = null;
      state.hintCells = [];
      state.failEffects = [];
      state.successEffects = [];
      clearPathEffects();
      state.hoverPoint = null;
      state.hoverActiveTiles = [];
      state.cleared = false;
      state.elapsedSec = 0;
      state.lastPairs = [];
      state.lastRemainingCount = 0;
      state.board = [];
      hideClearPopup();
      updateModeHud();
      render(false);
      setStartOverlayVisible(true);
      setMessage("중앙 새 게임 버튼을 눌러 시작하세요.");
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function makeValuePool(totalCells, kindCount) {
      const pairCount = totalCells / 2;
      const ids = [];
      for (let i = 0; i < pairCount; i += 1) {
        const id = i % kindCount;
        ids.push(id, id);
      }
      return shuffleArray(ids);
    }

    function startGame() {
      const rows = Number(rowsEl.value);
      const cols = Number(colsEl.value);
      const kinds = Number(kindsEl.value);
      const mode = state.mode === "challenge" ? "challenge" : "relaxed";

      if (!Number.isInteger(rows) || !Number.isInteger(cols) || rows < 2 || cols < 2) {
        setMessage("행/열은 2 이상의 정수로 입력해주세요.");
        return;
      }

      if ((rows * cols) % 2 !== 0) {
        setMessage("타일 개수(n*m)는 짝수여야 합니다.");
        return;
      }

      if (!Number.isInteger(kinds) || kinds < 2 || kinds > SYMBOLS.length) {
        setMessage(`문양 종류 수는 2~${SYMBOLS.length} 사이로 입력해주세요.`);
        return;
      }

      state.rows = rows;
      state.cols = cols;
      state.kinds = kinds;
      state.mode = mode;
      state.selected = null;
      state.hintCells = [];
      state.failEffects = [];
      state.successEffects = [];
      clearPathEffects();
      state.hoverPoint = null;
      state.hoverActiveTiles = [];
      state.resolvingDeadlock = false;
      state.cleared = false;
      state.elapsedSec = 0;
      state.started = true;
      hideClearPopup();
      setStartOverlayVisible(false);

      const cfg = MODE_CONFIG[state.mode];
      state.hintLeft = cfg.hintLimit;
      state.shuffleLeft = cfg.shuffleLimit;
      updateModeHud();
      startTimer();

      const ids = makeValuePool(rows * cols, kinds);
      state.board = Array.from({ length: rows }, (_, r) =>
        Array.from({ length: cols }, (_, c) => ({
          id: ids[r * cols + c],
          removed: false,
          removing: false
        }))
      );

      render(true, { spawn: !state.lowSpec });
      setMessage(`${cfg.label}로 새 게임을 시작했습니다.`);
    }

    function cellBlocked(r, c, start, end) {
      if (r === start.r && c === start.c) return false;
      if (r === end.r && c === end.c) return false;
      if (r < 1 || r > state.rows || c < 1 || c > state.cols) return false;
      const cell = state.board[r - 1][c - 1];
      return !cell.removed && !cell.removing;
    }

    function keyOf(state) {
      return `${state.r},${state.c},${state.dir}`;
    }

    function compressPath(points) {
      if (points.length <= 2) return points;
      const out = [points[0]];

      for (let i = 1; i < points.length - 1; i += 1) {
        const p0 = points[i - 1];
        const p1 = points[i];
        const p2 = points[i + 1];
        const dr1 = p1.r - p0.r;
        const dc1 = p1.c - p0.c;
        const dr2 = p2.r - p1.r;
        const dc2 = p2.c - p1.c;
        if (dr1 !== dr2 || dc1 !== dc2) out.push(p1);
      }

      out.push(points[points.length - 1]);
      return out;
    }

    function findConnectionPath(a, b) {
      const start = { r: a.r + 1, c: a.c + 1 };
      const end = { r: b.r + 1, c: b.c + 1 };
      const maxR = state.rows + 1;
      const maxC = state.cols + 1;
      const dirs = [
        { dr: -1, dc: 0 },
        { dr: 1, dc: 0 },
        { dr: 0, dc: -1 },
        { dr: 0, dc: 1 }
      ];

      const visited = Array.from({ length: state.rows + 2 }, () =>
        Array.from({ length: state.cols + 2 }, () => Array(4).fill(3))
      );

      const startState = { r: start.r, c: start.c, dir: -1, turns: 0 };
      const queue = [startState];
      let qIndex = 0;
      const parent = new Map();
      let endKey = null;

      while (qIndex < queue.length) {
        const cur = queue[qIndex++];
        const curKey = keyOf(cur);
        for (let d = 0; d < 4; d += 1) {
          const extraTurn = cur.dir === -1 || cur.dir === d ? 0 : 1;
          const newTurns = cur.turns + extraTurn;
          if (newTurns > 2) continue;

          let nr = cur.r + dirs[d].dr;
          let nc = cur.c + dirs[d].dc;

          while (nr >= 0 && nr <= maxR && nc >= 0 && nc <= maxC) {
            if (cellBlocked(nr, nc, start, end)) break;

            if (visited[nr][nc][d] > newTurns) {
              visited[nr][nc][d] = newTurns;
              const nextState = { r: nr, c: nc, dir: d, turns: newTurns };
              const nextKey = keyOf(nextState);
              parent.set(nextKey, curKey);
              queue.push(nextState);

              if (nr === end.r && nc === end.c) {
                endKey = nextKey;
                queue.length = 0;
                break;
              }
            }

            nr += dirs[d].dr;
            nc += dirs[d].dc;
          }
        }
      }

      if (!endKey) return null;

      const states = [];
      let cursor = endKey;
      while (cursor) {
        const [r, c] = cursor.split(",").map(Number);
        states.push({ r, c });
        cursor = parent.get(cursor) || null;
      }

      states.reverse();
      return compressPath(states);
    }

    function getActiveTiles() {
      const tiles = [];
      for (let r = 0; r < state.rows; r += 1) {
        for (let c = 0; c < state.cols; c += 1) {
          const cell = state.board[r][c];
          if (!cell.removed && !cell.removing) tiles.push({ r, c, id: cell.id });
        }
      }
      return tiles;
    }

    function findAllPairs() {
      const active = getActiveTiles();
      const pairs = [];
      const byId = new Map();

      for (const tile of active) {
        const list = byId.get(tile.id);
        if (list) list.push(tile);
        else byId.set(tile.id, [tile]);
      }

      for (const group of byId.values()) {
        for (let i = 0; i < group.length; i += 1) {
          for (let j = i + 1; j < group.length; j += 1) {
            const path = findConnectionPath(group[i], group[j]);
            if (path) pairs.push([group[i], group[j], path]);
          }
        }
      }

      return pairs;
    }

    function clearHint() { state.hintCells = []; }
    function setMessage(text) {
      if (messageEl.textContent === text) return;
      messageEl.textContent = text;
    }
    function showClearPopup() {
      clearTitleEl.textContent = `[${MODE_CONFIG[state.mode].label}] 클리어!`;
      clearTimeEl.textContent = formatTime(state.elapsedSec);
      clearPopupEl.classList.add("show");
      clearPopupEl.setAttribute("aria-hidden", "false");
    }
    function hideClearPopup() {
      clearPopupEl.classList.remove("show");
      clearPopupEl.setAttribute("aria-hidden", "true");
    }

    function applyFailEffectsToDom() {
      const failSet = new Set();
      for (const f of state.failEffects) {
        for (const cell of f.cells) failSet.add(`${cell.r},${cell.c}`);
      }

      for (const tile of boardEl.children) {
        if (!tile.classList.contains("tile")) continue;
        const key = `${tile.dataset.r},${tile.dataset.c}`;
        if (failSet.has(key)) tile.classList.add("fail");
        else tile.classList.remove("fail");
      }
    }

    function applySuccessEffectsToDom() {
      const successSet = new Set();
      for (const s of state.successEffects) {
        for (const cell of s.cells) successSet.add(`${cell.r},${cell.c}`);
      }

      for (const tile of boardEl.children) {
        if (!tile.classList.contains("tile")) continue;
        const key = `${tile.dataset.r},${tile.dataset.c}`;
        if (successSet.has(key)) tile.classList.add("success");
        else tile.classList.remove("success");
      }
    }

    function applyHoverWave() {
      state.hoverRaf = 0;
      const point = state.hoverPoint;
      const radius = 140;

      if (!point) {
        for (const tile of state.hoverActiveTiles) {
          tile.style.setProperty("--hover-lift", "0px");
          tile.style.setProperty("--hover-scale", "1");
          tile.dataset.hw = "0";
        }
        state.hoverActiveTiles = [];
        return;
      }

      const nextActive = [];
      for (const target of state.hoverTargets) {
        const tile = target.tile;
        const cx = target.cx;
        const cy = target.cy;
        const dx = point.x - cx;
        const dy = point.y - cy;
        const dist = Math.hypot(dx, dy);
        const influence = Math.max(0, 1 - dist / radius);
        const eased = influence * influence;
        if (eased > 0.01) {
          const lift = 8 * eased;
          const scale = 1 + 0.07 * eased;
          tile.style.setProperty("--hover-lift", `${lift.toFixed(2)}px`);
          tile.style.setProperty("--hover-scale", scale.toFixed(3));
          tile.dataset.hw = "1";
          nextActive.push(tile);
        } else if (tile.dataset.hw === "1") {
          tile.style.setProperty("--hover-lift", "0px");
          tile.style.setProperty("--hover-scale", "1");
          tile.dataset.hw = "0";
        }
      }
      state.hoverActiveTiles = nextActive;
    }

    function rebuildHoverTargets() {
      state.hoverTargets = [];
      for (const tile of boardEl.children) {
        if (!tile.classList.contains("tile") || tile.classList.contains("removed")) continue;
        state.hoverTargets.push({
          tile,
          cx: tile.offsetLeft + tile.offsetWidth / 2,
          cy: tile.offsetTop + tile.offsetHeight / 2
        });
      }
    }

    function scheduleHoverWave(force = false) {
      if (state.lowSpec && !force) return;
      if (state.hoverRaf) return;
      state.hoverRaf = requestAnimationFrame(applyHoverWave);
    }

    function refreshTransientEffects() {
      applyFailEffectsToDom();
      applySuccessEffectsToDom();
      drawEffectPaths(state.effectPaths);
      scheduleHoverWave();
    }

    function updateStats(recalculate = true) {
      if (recalculate) {
        const active = getActiveTiles();
        state.lastRemainingCount = active.length;
        state.lastPairs = findAllPairs();
      }

      const activeCount = state.lastRemainingCount;
      const pairs = state.lastPairs;
      remainingCountEl.textContent = String(activeCount);
      pairCountEl.textContent = String(pairs.length);

      if (activeCount === 0) {
        if (!state.cleared) {
          state.cleared = true;
          stopTimer();
          showClearPopup();
          setMessage("");
        }
      } else if (pairs.length === 0) {
        resolveDeadlock();
      }
    }

    function resolveDeadlock() {
      if (state.resolvingDeadlock || state.lastRemainingCount === 0) return;
      state.resolvingDeadlock = true;
      doShuffleSymbols({ consume: false, auto: true });
      state.resolvingDeadlock = false;
    }

    function clearPathEffects() {
      state.effectPaths = [];
      state.pathQueue = [];
      state.pathAnimating = false;
      state.lastPathSig = "";
      state.lastPathAt = 0;
      state.pathRenderKey = "";
      pathLayerEl.innerHTML = "";
    }

    function pathSignature(path) {
      return path.map((p) => `${p.r},${p.c}`).join("|");
    }

    function playNextPathEffect() {
      if (state.pathAnimating) return;
      const next = state.pathQueue.shift();
      if (!next) return;
      state.pathAnimating = true;
      state.effectPaths = [next];
      refreshTransientEffects();

      setTimeout(() => {
        state.effectPaths = [];
        state.pathAnimating = false;
        refreshTransientEffects();
        playNextPathEffect();
      }, 900);
    }

    function addPathEffect(path) {
      const sig = pathSignature(path);
      const now = performance.now();
      if (state.lastPathSig === sig && (now - state.lastPathAt) < 140) return;
      state.lastPathSig = sig;
      state.lastPathAt = now;

      const id = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      state.pathQueue.push({ id, points: path });
      playNextPathEffect();
    }

    function addSuccessEffect(a, b) {
      const id = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      state.successEffects.push({ id, cells: [a, b] });
      refreshTransientEffects();

      setTimeout(() => {
        state.successEffects = state.successEffects.filter((s) => s.id !== id);
        refreshTransientEffects();
      }, 260);
    }

    function addFailEffect(a, b) {
      const id = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      state.failEffects.push({ id, cells: [a, b] });
      refreshTransientEffects();

      setTimeout(() => {
        state.failEffects = state.failEffects.filter((f) => f.id !== id);
        refreshTransientEffects();
      }, 300);
    }

    function handleTileClick(r, c) {
      if (!state.started) return;
      if (state.cleared) return;
      if (state.hintCells.length > 0) {
        const clickedHint = state.hintCells.some((h) => h.r === r && h.c === c);
        if (clickedHint) {
          state.hintCells = state.hintCells.filter((h) => !(h.r === r && h.c === c));
        } else {
          clearHint();
        }
      }
      const cell = state.board[r][c];
      if (cell.removed || cell.removing) return;

      if (!state.selected) {
        state.selected = { r, c };
        render(false);
        return;
      }

      if (state.selected.r === r && state.selected.c === c) {
        state.selected = null;
        render(false);
        return;
      }

      const first = state.board[state.selected.r][state.selected.c];
      if (first.id !== cell.id) {
        state.selected = { r, c };
        setMessage("같은 문양 타일을 선택해주세요.");
        render(false);
        return;
      }

      const a = { r: state.selected.r, c: state.selected.c, id: first.id };
      const b = { r, c, id: cell.id };
      const path = findConnectionPath(a, b);

      if (path) {
        state.board[a.r][a.c].removing = true;
        state.board[b.r][b.c].removing = true;
        state.selected = null;
        addSuccessEffect(a, b);
        addPathEffect(path);
        setMessage("타일을 제거했습니다.");
        render(true);

        setTimeout(() => {
          state.board[a.r][a.c].removed = true;
          state.board[b.r][b.c].removed = true;
          state.board[a.r][a.c].removing = false;
          state.board[b.r][b.c].removing = false;
          render(true);
        }, 300);
      } else {
        addFailEffect(a, b);
        state.selected = { r, c };
        setMessage("연결할 수 없는 위치입니다.");
        render(false);
      }
    }

    function doShuffleSymbols(options = {}) {
      if (!state.started) {
        setMessage("먼저 새 게임을 시작해 주세요.");
        return;
      }
      if (state.cleared) return;
      const consume = options.consume !== false;
      const auto = options.auto === true;

      clearHint();
      state.selected = null;
      state.failEffects = [];
      state.successEffects = [];
      clearPathEffects();
      state.hoverPoint = null;
      state.hoverActiveTiles = [];
      const active = getActiveTiles();

      if (active.length < 2) {
        setMessage("섞을 타일이 부족합니다.");
        return;
      }

      if (consume && state.mode === "challenge") {
        if (state.shuffleLeft <= 0) {
          setMessage("도전 모드에서는 재배치 기회를 모두 사용했습니다.");
          return;
        }
        state.shuffleLeft -= 1;
      }

      let found = false;
      for (let attempt = 0; attempt < 20; attempt += 1) {
        const ids = shuffleArray(active.map((t) => t.id));
        active.forEach((tile, idx) => {
          state.board[tile.r][tile.c].id = ids[idx];
        });
        if (findAllPairs().length > 0) {
          found = true;
          break;
        }
      }

      render(true, { spawn: !state.lowSpec });
      updateModeHud();
      if (auto) {
        setMessage("가능한 조합이 없어 자동으로 재배치했습니다. (기회 차감 없음)");
      } else if (!found) {
        setMessage("재배치 후에도 조합이 매우 적습니다. 다시 재배치해보세요.");
      } else {
        setMessage("타일 위치는 고정하고 문양만 섞었습니다.");
      }
    }

    function showHint() {
      if (!state.started) {
        setMessage("먼저 새 게임을 시작해 주세요.");
        return;
      }
      if (state.cleared) return;
      clearHint();
      state.selected = null;
      const pairs = state.lastPairs;

      if (pairs.length === 0) {
        setMessage("힌트를 찾지 못했습니다. 가능한 조합이 없습니다.");
        render(false);
        return;
      }

      if (state.mode === "challenge") {
        if (state.hintLeft <= 0) {
          setMessage("도전 모드에서는 힌트 기회를 모두 사용했습니다.");
          render(false);
          return;
        }
        state.hintLeft -= 1;
        updateModeHud();
      }

      state.hintCells = [pairs[0][0], pairs[0][1]];
      setMessage("힌트: 강조된 두 타일 중 하나를 먼저 선택해보세요.");
      render(false);
    }

    function drawEffectPaths(paths) {
      if (!paths || paths.length === 0) {
        if (state.pathRenderKey !== "") {
          pathLayerEl.innerHTML = "";
          state.pathRenderKey = "";
        }
        return;
      }

      const renderKey = paths.map((p) => p.id).join("|");
      if (state.pathRenderKey === renderKey) return;
      state.pathRenderKey = renderKey;
      pathLayerEl.innerHTML = "";

      const sampleTile = boardEl.querySelector(".tile:not(.removed)");
      if (!sampleTile) return;

      const tileRect = sampleTile.getBoundingClientRect();
      const stackRect = boardStackEl.getBoundingClientRect();
      const gap = parseFloat(getComputedStyle(boardEl).gap || "0");
      const stepX = tileRect.width + gap;
      const stepY = tileRect.height + gap;
      const width = boardStackEl.clientWidth;
      const height = boardStackEl.clientHeight;

      pathLayerEl.setAttribute("width", String(width));
      pathLayerEl.setAttribute("height", String(height));
      pathLayerEl.setAttribute("viewBox", `0 0 ${width} ${height}`);
      pathLayerEl.style.left = "0";
      pathLayerEl.style.top = "0";

      const centers = new Map();
      const tiles = boardEl.querySelectorAll(".tile");
      for (const tile of tiles) {
        const r = Number(tile.dataset.r);
        const c = Number(tile.dataset.c);
        const rect = tile.getBoundingClientRect();
        const x = rect.left - stackRect.left + rect.width / 2;
        const y = rect.top - stackRect.top + rect.height / 2;
        centers.set(`${r},${c}`, { x, y });
      }

      const origin = centers.get("0,0");
      if (!origin) return;

      const rightRef = centers.get("0,1");
      const downRef = centers.get("1,0");
      const realStepX = rightRef ? (rightRef.x - origin.x) : stepX;
      const realStepY = downRef ? (downRef.y - origin.y) : stepY;

      function pointToXY(point) {
        const br = point.r - 1;
        const bc = point.c - 1;
        const direct = centers.get(`${br},${bc}`);
        if (direct) return direct;
        return {
          x: origin.x + bc * realStepX,
          y: origin.y + br * realStepY
        };
      }

      for (const path of paths) {
        const points = path.points.map((p) => {
          const pos = pointToXY(p);
          return `${pos.x},${pos.y}`;
        }).join(" ");

        const main = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        main.setAttribute("points", points);
        main.setAttribute("class", "path-main");

        const glow = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        glow.setAttribute("points", points);
        glow.setAttribute("class", "path-glow");

        let totalLength = 220;
        try {
          if (typeof main.getTotalLength === "function") {
            totalLength = Math.max(1, main.getTotalLength());
          }
        } catch (err) {
          totalLength = 220;
        }
        main.style.strokeDasharray = String(totalLength);
        main.style.strokeDashoffset = String(totalLength);
        glow.style.strokeDasharray = String(totalLength);
        glow.style.strokeDashoffset = String(totalLength);
        main.style.setProperty("--path-len", String(totalLength));
        glow.style.setProperty("--path-len", String(totalLength));

        if (!state.lowSpec) pathLayerEl.appendChild(glow);
        pathLayerEl.appendChild(main);
      }
    }

    function render(recalculateStats = false, options = {}) {
      const shouldSpawn = Boolean(options.spawn) && !state.lowSpec;
      if (!state.started || state.board.length === 0) {
        boardEl.style.gridTemplateColumns = "none";
        boardEl.innerHTML = "";
        state.hoverTargets = [];
        drawEffectPaths([]);
        pathLayerEl.innerHTML = "";
        state.pathRenderKey = "";
        remainingCountEl.textContent = "0";
        pairCountEl.textContent = "0";
        hintLeftEl.textContent = Number.isFinite(state.hintLeft) ? String(state.hintLeft) : "∞";
        shuffleLeftEl.textContent = Number.isFinite(state.shuffleLeft) ? String(state.shuffleLeft) : "∞";
        return;
      }
      boardEl.style.gridTemplateColumns = `repeat(${state.cols}, minmax(40px, auto))`;
      boardEl.innerHTML = "";
      const fragment = document.createDocumentFragment();

      for (let r = 0; r < state.rows; r += 1) {
        for (let c = 0; c < state.cols; c += 1) {
          const cell = state.board[r][c];
          const tile = document.createElement("button");
          tile.className = "tile";
          tile.type = "button";
          tile.dataset.r = String(r);
          tile.dataset.c = String(c);

          if (cell.removed) {
            tile.classList.add("removed");
            tile.textContent = "";
          } else {
            tile.textContent = SYMBOLS[cell.id];
            tile.style.setProperty("--h", String((cell.id * 37) % 360));
            if (cell.removing) tile.classList.add("removing");
          }

          if (state.selected && state.selected.r === r && state.selected.c === c) {
            tile.classList.add("selected");
          }

          if (state.hintCells.some((h) => h.r === r && h.c === c)) {
            tile.classList.add("hint");
          }

          if (shouldSpawn && !cell.removed && !cell.removing) {
            const jitter = Math.floor(Math.random() * 120);
            const wave = ((r + c) % 4) * 22;
            tile.classList.add("spawning");
            tile.style.setProperty("--spawn-delay", `${jitter + wave}ms`);
          }

          fragment.appendChild(tile);
        }
      }
      boardEl.appendChild(fragment);

      state.hoverTargets = [];
      if (!state.lowSpec) rebuildHoverTargets();

      if (state.effectPaths.length === 0) {
        const sampleTile = boardEl.querySelector(".tile:not(.removed)");
        if (sampleTile) {
          const tileRect = sampleTile.getBoundingClientRect();
          const gap = parseFloat(getComputedStyle(boardEl).gap || "8");
          const stepX = tileRect.width + gap;
          const stepY = tileRect.height + gap;
          boardStackEl.style.padding = `${stepY}px ${stepX}px`;
        }
      }

      refreshTransientEffects();
      updateStats(recalculateStats);
    }

    function getTileFromEventTarget(target) {
      if (!(target instanceof Element)) return null;
      const tile = target.closest(".tile");
      if (!tile || !boardEl.contains(tile)) return null;
      const r = Number(tile.dataset.r);
      const c = Number(tile.dataset.c);
      if (!Number.isInteger(r) || !Number.isInteger(c)) return null;
      return { tile, r, c };
    }

    boardEl.addEventListener("pointerdown", (event) => {
      const hit = getTileFromEventTarget(event.target);
      if (!hit) {
        state.tapPointer = null;
        return;
      }
      state.tapPointer = {
        id: event.pointerId,
        x: event.clientX,
        y: event.clientY,
        r: hit.r,
        c: hit.c
      };
    });

    boardEl.addEventListener("pointerup", (event) => {
      const hit = getTileFromEventTarget(event.target);
      if (!hit || !state.tapPointer) return;
      if (event.pointerId !== state.tapPointer.id) return;

      const moved = Math.hypot(event.clientX - state.tapPointer.x, event.clientY - state.tapPointer.y);
      const sameTile = (hit.r === state.tapPointer.r) && (hit.c === state.tapPointer.c);
      state.tapPointer = null;
      if (!sameTile || moved > 14) return;
      if (event.pointerType === "mouse") return;

      event.preventDefault();
      state.lastTouchTapAt = performance.now();
      handleTileClick(hit.r, hit.c);
    });

    boardEl.addEventListener("pointercancel", () => {
      state.tapPointer = null;
    });

    boardEl.addEventListener("click", (event) => {
      const hit = getTileFromEventTarget(event.target);
      if (!hit) return;
      if (performance.now() - state.lastTouchTapAt < 500) return;
      handleTileClick(hit.r, hit.c);
    });

    if (!window.PointerEvent) {
      boardEl.addEventListener("touchend", (event) => {
        const touch = event.changedTouches && event.changedTouches[0];
        if (!touch) return;
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        const hit = getTileFromEventTarget(target);
        if (!hit) return;
        event.preventDefault();
        state.lastTouchTapAt = performance.now();
        handleTileClick(hit.r, hit.c);
      }, { passive: false });
    }

    boardEl.addEventListener("pointermove", (event) => {
      if (event.pointerType === "touch") return;
      const isPenHover = event.pointerType === "pen" && event.buttons === 0;
      const allowHover = event.pointerType === "mouse" || isPenHover;
      if (!allowHover) return;
      if (state.lowSpec && !isPenHover) return;
      if (state.hoverTargets.length === 0) rebuildHoverTargets();
      const rect = boardEl.getBoundingClientRect();
      state.hoverPoint = {
        x: event.clientX - rect.left + boardEl.scrollLeft,
        y: event.clientY - rect.top + boardEl.scrollTop
      };
      scheduleHoverWave(isPenHover);
    });

    boardEl.addEventListener("pointerleave", () => {
      if (state.lowSpec && state.hoverActiveTiles.length === 0) return;
      state.hoverPoint = null;
      scheduleHoverWave(true);
    });

    document.getElementById("newGame").addEventListener("click", startGame);
    clearNewGameEl.addEventListener("click", startGame);
    if (startFromCenterEl) startFromCenterEl.addEventListener("click", startGame);
    document.getElementById("shuffle").addEventListener("click", doShuffleSymbols);
    document.getElementById("hint").addEventListener("click", showHint);
    modeRelaxedBtnEl.addEventListener("click", () => setModeChoice("relaxed", true));
    modeChallengeBtnEl.addEventListener("click", () => setModeChoice("challenge", true));

    themePresetEl.addEventListener("change", () => {
      const preset = THEME_PRESETS[themePresetEl.value] || THEME_PRESETS.sunset;
      applyThemeColors(preset);
      applySelectionStyle(state.selectionStyle);
      refreshTransientEffects();
    });

    function applyCustomThemeFromPickers() {
      applyThemeColors({
        selected: pickSelectedEl.value,
        match: pickMatchEl.value,
        path: pickPathEl.value,
        pathGlow: pickPathGlowEl.value
      });
      applySelectionStyle(state.selectionStyle);
      refreshTransientEffects();
    }

    pickSelectedEl.addEventListener("input", applyCustomThemeFromPickers);
    pickMatchEl.addEventListener("input", applyCustomThemeFromPickers);
    pickPathEl.addEventListener("input", applyCustomThemeFromPickers);
    pickPathGlowEl.addEventListener("input", applyCustomThemeFromPickers);
    if (selectionStyleEl) {
      selectionStyleEl.addEventListener("change", () => applySelectionStyle(selectionStyleEl.value));
    }
    if (lowSpecModeEl) {
      lowSpecModeEl.addEventListener("change", () => applyPerformanceMode(lowSpecModeEl.checked));
    }

    uploadBoardBgEl.addEventListener("change", () => {
      const file = uploadBoardBgEl.files && uploadBoardBgEl.files[0];
      if (!file) return;
      if (state.boardBgObjectUrl) URL.revokeObjectURL(state.boardBgObjectUrl);
      const url = URL.createObjectURL(file);
      state.boardBgObjectUrl = url;
      setBoardBackgroundImage(url);
      setMessage("퍼즐 배경 이미지를 적용했습니다.");
    });

    clearBoardBgEl.addEventListener("click", () => {
      if (state.boardBgObjectUrl) {
        URL.revokeObjectURL(state.boardBgObjectUrl);
        state.boardBgObjectUrl = null;
      }
      uploadBoardBgEl.value = "";
      setBoardBackgroundImage(null);
      setMessage("퍼즐 배경 이미지를 초기화했습니다.");
    });

    bgmPresetEl.addEventListener("change", () => {
      const idx = Number(bgmPresetEl.value);
      applyBgmTrack(Number.isInteger(idx) ? idx : 0, false);
      setMessage(`BGM 트랙: ${bgmState.tracks[bgmState.currentIndex].name}`);
    });

    bgmPlayEl.addEventListener("click", () => {
      if (bgmState.youtubeActive) stopYoutubePlayback();
      if (!bgmPlayer.src && !(bgmState.tracks[bgmState.currentIndex] && bgmState.tracks[bgmState.currentIndex].synth)) {
        applyBgmTrack(bgmState.currentIndex, false);
      }
      tryUnlockAudio().then(() => {
        const track = bgmState.tracks[bgmState.currentIndex];
        if (track && track.synth) {
          playSynth(track.synth);
          return;
        }
        bgmPlayer.play().catch(() => {
          const hint = location.protocol === "file:"
            ? "file:// 환경에서는 오디오 차단이 자주 발생합니다. bat로 실행한 localhost 페이지에서 다시 시도해주세요."
            : "재생 실패: 네트워크 차단 또는 브라우저 정책일 수 있습니다. 오프라인 트랙 또는 내 음악 업로드를 사용해보세요.";
          setMessage(hint);
        });
      });
    });

    bgmPauseEl.addEventListener("click", () => {
      bgmPlayer.pause();
      stopSynth();
    });

    bgmMuteEl.addEventListener("click", () => {
      if (bgmState.youtubeActive) {
        setMessage("유튜브 음소거는 임베드 플레이어에서 조절해주세요.");
        return;
      }
      bgmPlayer.muted = !bgmPlayer.muted;
      if (bgmState.synthGain) {
        bgmState.synthGain.gain.value = bgmPlayer.muted ? 0 : Number(bgmVolumeEl.value) / 100;
      }
      bgmMuteEl.textContent = bgmPlayer.muted ? "음소거 해제" : "음소거";
    });

    bgmVolumeEl.addEventListener("input", () => {
      bgmPlayer.volume = Number(bgmVolumeEl.value) / 100;
      if (bgmState.synthGain) {
        bgmState.synthGain.gain.value = bgmPlayer.muted ? 0 : Number(bgmVolumeEl.value) / 100;
      }
      if (bgmPlayer.volume > 0 && bgmPlayer.muted) {
        bgmPlayer.muted = false;
        bgmMuteEl.textContent = "음소거";
      }
    });

    uploadBgmEl.addEventListener("change", () => {
      const files = uploadBgmEl.files ? Array.from(uploadBgmEl.files) : [];
      if (files.length === 0) return;

      for (const file of files) {
        const url = URL.createObjectURL(file);
        bgmState.customUrls.push(url);
        bgmState.tracks.push({ name: `내 음악 · ${file.name}`, url });
      }

      rebuildBgmOptions();
      const newIndex = bgmState.tracks.length - files.length;
      applyBgmTrack(newIndex, true);
      setMessage(`내 음악 ${files.length}곡을 추가했습니다.`);
    });

    playYoutubeEl.addEventListener("click", playYoutube);
    stopYoutubeEl.addEventListener("click", () => {
      stopYoutubePlayback();
      setMessage("YouTube 재생을 종료했습니다.");
    });

    uploadVideoEl.addEventListener("change", () => {
      const file = uploadVideoEl.files && uploadVideoEl.files[0];
      if (!file) return;
      playLocalVideo(file);
    });

    stopVideoEl.addEventListener("click", () => {
      stopLocalVideoPlayback();
      setMessage("오프라인 영상 재생을 종료했습니다.");
    });

    ytSizeEl.addEventListener("input", () => {
      ytSizeEl.dataset.pending = ytSizeEl.value;
    });
    ytSizeEl.addEventListener("change", applyMediaWidthFromSlider);

    layoutSideBtnEl.addEventListener("click", () => applyLayoutMode("side"));
    layoutStackBtnEl.addEventListener("click", () => applyLayoutMode("stack"));
    lightModeBtnEl.addEventListener("click", () => applyUiTheme("light"));
    darkModeBtnEl.addEventListener("click", () => applyUiTheme("dark"));
    if (toneWarmBtnEl) toneWarmBtnEl.addEventListener("click", () => applyUiTone("warm"));
    if (toneCoolBtnEl) toneCoolBtnEl.addEventListener("click", () => applyUiTone("cool"));
    if (toggleMediaControlsEl) {
      toggleMediaControlsEl.addEventListener("click", () => {
        const next = !mediaControlsEl.classList.contains("collapsed");
        setMediaControlsCollapsed(next);
      });
    }

    const unlockOnce = () => {
      tryUnlockAudio().then((ok) => {
        if (!ok) return;
      });
      document.removeEventListener("pointerdown", unlockOnce);
      document.removeEventListener("keydown", unlockOnce);
    };
    document.addEventListener("pointerdown", unlockOnce, { once: true });
    document.addEventListener("keydown", unlockOnce, { once: true });

    window.addEventListener("beforeunload", () => {
      stopTimer();
      stopSynth();
      if (state.boardBgObjectUrl) URL.revokeObjectURL(state.boardBgObjectUrl);
      stopLocalVideoPlayback();
      for (const url of bgmState.customUrls) URL.revokeObjectURL(url);
      stopYoutubePlayback();
    });

    window.addEventListener("resize", () => {
      applyMediaWidthFromSlider();
    });

    if (mediaControlsEl && mediaHeadEl) {
      mediaHeadEl.insertAdjacentElement("afterend", mediaControlsEl);
    }

    const gameHeadEl = document.querySelector(".game-column .panel-head");
    const roundTimeChipEl = timeDisplayEl ? timeDisplayEl.closest(".time-chip") : null;
    if (gameHeadEl && roundTimeChipEl) {
      gameHeadEl.appendChild(roundTimeChipEl);
    }

    function setFieldLabel(inputEl, title) {
      const label = inputEl ? inputEl.closest("label") : null;
      if (!label) return;
      label.classList.add("setting-field");
      for (const node of label.childNodes) {
        if (node.nodeType === Node.TEXT_NODE) {
          node.textContent = title;
          break;
        }
      }
    }

    setFieldLabel(rowsEl, "가로");
    setFieldLabel(colsEl, "세로");
    setFieldLabel(kindsEl, "문양 종류");

    applyThemeColors(THEME_PRESETS.sunset);
    let initialUiTheme = "light";
    try {
      const stored = localStorage.getItem("sichuan-ui-theme");
      if (stored === "dark" || stored === "light") initialUiTheme = stored;
    } catch (err) {
      initialUiTheme = "light";
    }
    applyUiTheme(initialUiTheme);
    let initialUiTone = "warm";
    try {
      const storedTone = localStorage.getItem("sichuan-ui-tone");
      if (storedTone === "warm" || storedTone === "cool") initialUiTone = storedTone;
    } catch (err) {
      initialUiTone = "warm";
    }
    applyUiTone(initialUiTone);
    let initialSelectionStyle = "soft";
    let initialLowSpec = false;
    try {
      const storedSel = localStorage.getItem("sichuan-selection-style");
      if (storedSel === "soft" || storedSel === "neon") initialSelectionStyle = storedSel;
      initialLowSpec = localStorage.getItem("sichuan-low-spec") === "1";
    } catch (err) {
      initialSelectionStyle = "soft";
      initialLowSpec = false;
    }
    if (!initialLowSpec && window.matchMedia && window.matchMedia("(pointer: coarse)").matches) {
      initialLowSpec = true;
    }
    applySelectionStyle(initialSelectionStyle);
    applyPerformanceMode(initialLowSpec);
    bindStepper(rowsEl, "rowsDown", "rowsUp");
    bindStepper(colsEl, "colsDown", "colsUp");
    bindStepper(kindsEl, "kindsDown", "kindsUp");
    let initialMediaCollapsed = false;
    try {
      initialMediaCollapsed = localStorage.getItem("sichuan-media-controls-collapsed") === "1";
    } catch (err) {
      initialMediaCollapsed = false;
    }
    setMediaControlsCollapsed(initialMediaCollapsed);
    setBoardBackgroundImage(null);
    applyMediaWidthFromSlider();
    applyLayoutMode("side");
    rebuildBgmOptions();
    applyBgmTrack(0, false);
    setModeChoice("relaxed", false);
    resetToStartScreen();

    openSettingsEl.addEventListener("click", () => {
      settingsModalEl.classList.add("active");
      settingsModalEl.setAttribute("aria-hidden", "false");
    });

    closeSettingsEl.addEventListener("click", () => {
      settingsModalEl.classList.remove("active");
      settingsModalEl.setAttribute("aria-hidden", "true");
    });

    settingsModalEl.addEventListener("click", (event) => {
      if (event.target === settingsModalEl) {
        settingsModalEl.classList.remove("active");
        settingsModalEl.setAttribute("aria-hidden", "true");
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && settingsModalEl.classList.contains("active")) {
        settingsModalEl.classList.remove("active");
        settingsModalEl.setAttribute("aria-hidden", "true");
      }
    });
  </script>
</body>
</html>
